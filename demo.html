<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porter — From git to prod in 60 seconds</title>
  <style>
    :root {
      --bg: #ffffff;
      --black: #111111;
      --yellow: #ffea4b;
      --border: #e9e9e9;
      --label: #666666;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      font-family: "Neue Haas Grotesk Display Pro", "Neue Haas Grotesk Text Pro", "Neue Haas Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--black);
      padding: 40px;
    }

    .demo-section {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .demo-video-wrap { position: relative; }

    .demo-video-heading {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 0px;
      position: relative;
      z-index: 2;
    }

    .heading-style-h1 {
      font-size: 72px;
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--black);
      margin: 0;
    }

    .heading-highlight {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: #D1EAFE;
      margin: 0 8px 0 0;
    }

    .heading-icon-wrap {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .heading-icon-wrap svg { width: 50px; height: 50px; }

    .demo-video-shell {
      background: #D1EAFE;
      padding: 16px 16px 0;
      position: relative;
      overflow: hidden;
    }

    .demo-video-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
      position: relative;
      z-index: 2;
    }

    .header-bar-label {
      background: #ffffff;
      border: 1px solid var(--border);
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .mono-sm {
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--black);
      font-family: monospace;
      text-transform: lowercase;
    }

    .corner-icon {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      margin-top: -16px; margin-right: -16px;
    }
    .corner-icon svg { width: 40px; height: 40px; }

    .demo-steps-timeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 28px;
      align-items: start;
      margin: 10px 0 -20px;
      position: relative;
      z-index: 2;
    }

    .timeline-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      opacity: 0.28;
      transition: opacity 240ms ease, transform 240ms ease;
      transform: translateY(0);
    }

    .timeline-step.is-active {
      opacity: 1;
      transform: translateY(-2px);
    }

    .timeline-step:not(.is-active) .connect .cube-right,
    .timeline-step:not(.is-active) .connect .dot,
    .timeline-step:not(.is-active) .live-grid .live-center,
    .timeline-step:not(.is-active) .live-grid .live-ring {
      animation-play-state: paused;
    }

    .timeline-step.is-active .connect .cube-right,
    .timeline-step.is-active .connect .dot,
    .timeline-step.is-active .live-grid .live-center,
    .timeline-step.is-active .live-grid .live-ring {
      animation-play-state: running;
    }

    .timeline-label {
      font-size: 14px;
      line-height: 1.2;
      min-height: 32px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      color: var(--black);
      font-family: monospace;
      text-transform: lowercase;
      width: 100%;
    }

    .timeline-top {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 84px;
    }

    .timeline-animation {
      width: 84px; height: 84px;
      display: grid; place-items: center;
      opacity: 0; visibility: hidden;
      transition: opacity 180ms ease;
    }

    .timeline-animation svg { width: 84px; height: 84px; }

    .timeline-step.is-active .timeline-animation {
      opacity: 1;
      visibility: visible;
    }

    .video-holder { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }

    .video-wrapper {
      width: 100%; max-width: 1100px; margin: 0 auto;
      background: transparent; border: 0; border-radius: 0;
      overflow: visible; box-shadow: none;
    }

    .video { width: 100%; height: auto; display: block; object-fit: cover; }

    @media (max-width: 1100px) {
      .heading-style-h1 { font-size: 56px; }
      .demo-steps-timeline { gap: 18px; }
    }

    @media (max-width: 820px) {
      body { padding: 24px; }
      .heading-style-h1 { font-size: 40px; }
      .demo-steps-timeline {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        row-gap: 24px;
      }
    }

    /* CONNECT */
    .connect .cube-left  { fill: var(--black); }
    .connect .cube-right { fill: var(--black); animation: connectCube 2.4s infinite; }
    .connect .dot {
      fill: var(--yellow); opacity: 0;
      transform-box: fill-box; transform-origin: center;
      animation: connectDot 2.4s infinite;
    }
    .connect .dot-1 { animation-delay: 0s; }
    .connect .dot-2 { animation-delay: 0.28s; }
    .connect .dot-3 { animation-delay: 0.56s; }
    .connect .dot-4 { animation-delay: 0.84s; }

    @keyframes connectDot {
      0%, 12%  { opacity: 0; transform: scale(0.45); }
      20%, 76% { opacity: 1; transform: scale(1); }
      100%     { opacity: 0; transform: scale(1); }
    }

    @keyframes connectCube {
      0%, 49%  { fill: var(--black); }
      50%, 76% { fill: var(--yellow); }
      100%     { fill: var(--black); }
    }

    /* DETECT */
    .detect-grid path {
      fill: var(--black);
      transition: fill 110ms linear, opacity 110ms linear, transform 110ms linear;
      transform-box: fill-box; transform-origin: center;
    }
    .detect-grid path.on    { fill: var(--yellow); }
    .detect-grid path.flash { fill: var(--yellow); transform: scale(1.02); }

    /* DEPLOY */
    .deploy-grid path {
      fill: var(--black); opacity: 0; transform: scale(0.9);
      transition: opacity 220ms ease, transform 220ms ease;
      transform-box: fill-box; transform-origin: center;
    }
    .deploy-grid path.on { opacity: 1; transform: scale(1); }

    /* LIVE */
    .live-grid path { fill: var(--black); }
    .live-grid .live-center {
      fill: var(--black);
      animation: liveCenterPulse 2.4s ease-in-out infinite;
      transform-box: fill-box; transform-origin: center;
    }
    .live-grid .live-ring {
      fill: var(--yellow); stroke: none; opacity: 0;
      transform-origin: center; transform-box: fill-box;
      filter: blur(.5px);
    }
    .live-grid .live-ring-1 { animation: liveRipple 2.4s ease-out infinite; }
    .live-grid .live-ring-2 { animation: liveRipple 2.4s ease-out infinite 1.2s; }

    @keyframes liveCenterPulse {
      0%, 100% { transform: scale(1); }
      25%      { transform: scale(1.06); }
      55%      { transform: scale(1); }
    }

    @keyframes liveRipple {
      0%   { opacity: 0; transform: scale(0.7); }
      12%  { opacity: 0.82; }
      45%  { opacity: 0.55; }
      100% { opacity: 0; transform: scale(2.6); }
    }

    .heading-git-icon path,
    .heading-prod-icon path,
    .decor-plus-icon path { fill: var(--black); }

    /* Nav back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-family: monospace;
      color: #555; text-decoration: none;
      margin-bottom: 32px;
    }
    .back-link:hover { color: var(--black); }
  </style>
</head>

  <script>
    const detectController = makeDetect(document.getElementById("timelineDetectSvg"));
    const deployController = makeDeploy(document.getElementById("timelineDeploySvg"));
    const liveController   = makeLive(document.getElementById("timelineLiveSvg"));

    function makeDetect(svg) {
      const cells = [...svg.querySelectorAll("path")];
      let activeFlash = new Set(), timer = null, running = false;
      function render() { cells.forEach((c,i) => c.classList.toggle("flash", activeFlash.has(i))); }
      function tick() {
        if (!running) return;
        activeFlash.clear();
        const n = 2 + Math.floor(Math.random() * 5);
        const used = new Set();
        while (used.size < n) used.add(Math.floor(Math.random() * cells.length));
        used.forEach(i => activeFlash.add(i));
        render();
        timer = setTimeout(tick, 70 + Math.random() * 120);
      }
      function start() { if (running) return; running = true; tick(); }
      function stop()  { running = false; clearTimeout(timer); activeFlash.clear(); render(); }
      render(); return { start, stop };
    }

    function makeDeploy(svg) {
      const cells = [...svg.querySelectorAll("path")];
      const size = 6, cellMap = new Map();
      let ct = null, st = null, running = false;
      cells.forEach(c => cellMap.set(c.dataset.r + '-' + c.dataset.c, c));
      function render(shape) {
        cells.forEach(c => c.classList.remove("on"));
        shape.forEach(([r,c]) => { const el = cellMap.get(r+'-'+c); if(el) el.classList.add("on"); });
      }
      function neighbors(r,c) {
        return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc])=>nr>=0&&nr<size&&nc>=0&&nc<size);
      }
      function genShape() {
        const target = 6 + Math.floor(Math.random()*7);
        const shape=[], used=new Set(), front=[];
        const sc = Math.floor(Math.random()*size);
        shape.push([size-1,sc]); used.add((size-1)+'-'+sc); front.push([size-1,sc]);
        while (shape.length < target && front.length) {
          const [r,c] = front[Math.floor(Math.random()*front.length)];
          const opts = neighbors(r,c).filter(([nr,nc])=>!used.has(nr+'-'+nc)).filter(([nr])=>nr<=r||Math.random()>0.35);
          if (!opts.length) { front.splice(front.findIndex(([fr,fc])=>fr===r&&fc===c),1); continue; }
          const [nr,nc] = opts[Math.floor(Math.random()*opts.length)];
          shape.push([nr,nc]); used.add(nr+'-'+nc); front.push([nr,nc]);
        }
        return shape.sort((a,b)=>a[0]!==b[0]?b[0]-a[0]:a[1]-b[1]);
      }
      function runCycle() {
        if (!running) return;
        const shape = genShape(), built = []; let i = 0;
        render([]);
        function next() {
          if (!running) return;
          if (i >= shape.length) { ct = setTimeout(runCycle, 1100); return; }
          built.push(shape[i++]); render(built);
          st = setTimeout(next, 120);
        }
        st = setTimeout(next, 120);
      }
      function start() { if (running) return; running = true; runCycle(); }
      function stop()  { running = false; clearTimeout(ct); clearTimeout(st); render([]); }
      render([]); return { start, stop };
    }

    function makeLive(svg) {
      const center = svg.querySelector(".live-center");
      const rings  = [...svg.querySelectorAll(".live-ring")];
      function start() { if(center) center.style.animationPlayState="running"; rings.forEach(r=>r.style.animationPlayState="running"); }
      function stop()  { if(center) center.style.animationPlayState="paused";  rings.forEach(r=>r.style.animationPlayState="paused"); }
      stop(); return { start, stop };
    }

    function setActivePhase(phase) {
      document.querySelectorAll(".timeline-step").forEach(el => el.classList.toggle("is-active", el.dataset.phase === phase));
      phase === "detect" ? detectController.start() : detectController.stop();
      phase === "deploy" ? deployController.start() : deployController.stop();
      phase === "live"   ? liveController.start()   : liveController.stop();
    }

    function getPhase(t) {
      const l = t % 16;
      if (l < 4)  return "source";
      if (l < 6)  return "detect";
      if (l < 10) return "deploy";
      return "live";
    }

    let cur = "source";
    const start = performance.now();
    function loop() {
      const next = getPhase((performance.now() - start) / 1000);
      if (next !== cur) { cur = next; setActivePhase(cur); }
      requestAnimationFrame(loop);
    }
    setActivePhase(cur);
    requestAnimationFrame(loop);
  </script>
